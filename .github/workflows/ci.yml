name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    uses: einky/.github/.github/workflow-templates/python.yml@main
    with:
      python-version: "3.12"
      source-paths: "src tests"

  c:
    uses: einky/.github/.github/workflow-templates/c.yml@main
    with:
      source-paths: "src/spi_driver"
      make-target: "compile-c-only"
      make-test-target: ""

  install-script-parity:
    name: install-renpy-sdk.sh parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: einky/meta
          path: meta
      - uses: actions/checkout@v4
        with:
          path: runtime
      - name: Compare scripts
        run: |
          # The runtime copy is normally a symlink to ../../meta/scripts/install-renpy-sdk.sh.
          # In CI the two repos are checked out side-by-side; verify byte parity.
          diff -q meta/scripts/install-renpy-sdk.sh runtime/scripts/install-renpy-sdk.sh

  contract-parity:
    name: hardware contract parity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: einky/meta
          path: meta
      - uses: actions/checkout@v4
        with:
          path: runtime
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Check generated files match meta/shared/hardware.toml
        run: |
          # meta and runtime are checked out side-by-side, matching the layout
          # gen_from_contract.py resolves by default (../meta/shared/hardware.toml).
          # Re-renders every committed constant file and fails on any drift.
          python runtime/scripts/gen_from_contract.py --check

  # A runtime change must not break the emulator boot/pipeline: build the image
  # with THIS runtime branch (OVERRIDE_SRCDIR) and run the A1 acceptance test.
  # Skippable with a `docs-only` label. See einky/buildroot_os image-e2e.yml.
  image-e2e:
    name: emulator image + A1
    if: ${{ github.event_name != 'pull_request' || !contains(github.event.pull_request.labels.*.name, 'docs-only') }}
    uses: einky/buildroot_os/.github/workflows/image-e2e.yml@main
    with:
      runtime_ref: ${{ github.event.pull_request.head.sha || github.sha }}
      # buildroot_os / launcher / meta default to main.
    secrets: inherit
