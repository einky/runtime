; ESP32 dev bridge: receive frames over TCP and forward to a Waveshare 7.5" V2
; e-paper, send button presses back over TCP. Demo-only — see ADR 0006.
[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600
build_flags =
    -DCORE_DEBUG_LEVEL=3
lib_deps =
    zinggjm/GxEPD2@^1.5.6
    adafruit/Adafruit GFX Library@^1.11.9
